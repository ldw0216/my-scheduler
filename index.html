<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>대학교 과제 및 일정 정리 (Cloud Sync)</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --main-color: #3498db; --bg-color: #f8f9fa; --border-color: #e1e8ed; --task-color: #3498db; --long-color: #f39c12; --success-color: #2ecc71; --danger-color: #e74c3c; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); margin: 0; padding: 20px; color: #2c3e50; padding-bottom: 120px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); }
        
        /* 프리셋 관리 섹션 */
        .preset-section { background: #fdfefe; border: 2px dashed #d6dbdf; padding: 20px; border-radius: 15px; margin-bottom: 25px; }
        .preset-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-top: 15px; }
        .preset-card { background: #f8f9fa; border: 1px solid #ddd; padding: 12px; border-radius: 10px; text-align: center; }
        .preset-name-input { width: 90%; border: 1px solid #ccc; border-radius: 4px; padding: 5px; margin-bottom: 8px; font-size: 0.85em; text-align: center; }
        
        .btn-preset-save { background: var(--success-color); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8em; margin-right: 4px; }
        .btn-preset-load { background: #6c5ce7; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8em; }

        /* 대시보드 및 리스트 */
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .widget-card { background: #fff; border: 1px solid var(--border-color); padding: 15px; border-radius: 12px; text-align: center; }
        .widget-value { font-size: 1.4em; font-weight: bold; color: var(--main-color); }
        .progress-container { width: 100%; background: #eee; border-radius: 10px; height: 10px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--main-color), var(--success-color)); transition: width 0.5s ease-in-out; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid var(--border-color); }
        .tab-btn { padding: 12px 25px; border: none; background: none; cursor: pointer; font-weight: bold; color: #7f8c8d; }
        .tab-btn.active { color: var(--main-color); border-bottom: 3px solid var(--main-color); }
        
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .subject-card { border: 1px solid var(--border-color); padding: 20px; border-radius: 12px; background: #fff; }
        .subject-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .subject-title { border: none; font-weight: bold; color: #1a508b; font-size: 1.1em; outline: none; width: 70%; }
        
        .task-row { margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px dashed #eee; }
        .input-group { display: flex; align-items: center; gap: 8px; }
        .task-input { flex: 1; border: none; border-bottom: 1px solid #ddd; outline: none; font-size: 0.9em; }
        .add-task-btn { width: 100%; padding: 8px; margin-top: 10px; border: 1px dashed var(--main-color); background: #f0f7ff; color: var(--main-color); border-radius: 6px; cursor: pointer; font-weight: bold; }

        .reset-wrapper { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .reset-btn { padding: 10px 18px; border: none; border-radius: 30px; color: white; cursor: pointer; font-weight: bold; font-size: 0.85em; box-shadow: 0 4px 15px rgba(0,0,0,0.2); background-color: #5d6d7e; }
        .sync-badge { font-size: 0.7em; color: var(--success-color); float: right; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center; margin-bottom: 20px;">
        <h1>대학교 과제 및 일정 정리 <span class="sync-badge" id="sync-status">● 연결 중</span></h1>
    </header>

    <div class="preset-section">
        <strong style="color: #566573;">✨ 과목 프리셋 관리 (최대 4개)</strong>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <input type="text" id="direct-sub-input" placeholder="개별 과목 추가" style="flex:1; padding:8px; border:1px solid #ddd; border-radius:6px;">
            <button onclick="addSubjectDirect()" style="background:var(--main-color); color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer;">+ 추가</button>
        </div>
        <div class="preset-grid" id="preset-container">
            </div>
    </div>

    <div class="dashboard">
        <div class="widget-card">
            <h4>전체 이행률</h4>
            <div class="widget-value" id="progress-text">0%</div>
            <div class="progress-container"><div id="progress-bar" class="progress-fill"></div></div>
        </div>
        <div class="widget-card"><h4>오늘 마감</h4><div class="widget-value" id="today-count" style="color:var(--danger-color)">0</div></div>
        <div class="widget-card"><h4>남은 과제</h4><div class="widget-value" id="remaining-count">0</div></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('list')">📋 리스트</button>
    </div>

    <div id="list-section" class="content-section">
        <div class="grid-layout" id="subject-container"></div>
    </div>
</div>

<div class="reset-wrapper">
    <button class="reset-btn" onclick="resetAll()">🧹 전체 데이터 초기화</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBFgo6A1AzR1XOF_xBPDcsAqbD-Otg8-vk",
        authDomain: "collage-scheduler.firebaseapp.com",
        databaseURL: "https://collage-scheduler-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "collage-scheduler",
        storageBucket: "collage-scheduler.appspot.com",
        messagingSenderId: "453104339634",
        appId: "1:453104339634:web:61fa883b7aad617d6917ab"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cloudData = {};
    let subjectList = {};
    let presets = {};

    db.ref().on("value", (snapshot) => {
        const data = snapshot.val() || {};
        cloudData = data.assignments || {};
        subjectList = data.subjectList || {};
        presets = data.presets || {
            p1: { name: "프리셋 1", subjects: [] },
            p2: { name: "프리셋 2", subjects: [] },
            p3: { name: "프리셋 3", subjects: [] },
            p4: { name: "프리셋 4", subjects: [] }
        };
        
        renderPresetUI();
        renderSubjects();
        updateWidgets();
        document.getElementById('sync-status').innerText = "● 동기화 완료";
    });

    // 프리셋 UI 생성
    function renderPresetUI() {
        const container = document.getElementById('preset-container');
        container.innerHTML = '';
        for(let i=1; i<=4; i++) {
            const pid = 'p' + i;
            const pData = presets[pid] || { name: "프리셋 "+i, subjects: [] };
            const card = document.createElement('div');
            card.className = 'preset-card';
            card.innerHTML = `
                <input type="text" class="preset-name-input" id="name-${pid}" value="${pData.name}" onchange="updatePresetName('${pid}', this.value)">
                <div>
                    <button class="btn-preset-save" onclick="saveToPreset('${pid}')">저장</button>
                    <button class="btn-preset-load" onclick="loadFromPreset('${pid}')">불러오기</button>
                </div>
            `;
            container.appendChild(card);
        }
    }

    function updatePresetName(pid, newName) { db.ref(`presets/${pid}/name`).set(newName); }

    function saveToPreset(pid) {
        const currentNames = Object.values(subjectList);
        if(currentNames.length === 0) { alert("저장할 과목이 없습니다."); return; }
        if(confirm(`현재 리스트를 '${presets[pid].name}'에 저장할까요?`)) {
            db.ref(`presets/${pid}/subjects`).set(currentNames);
            alert("저장되었습니다.");
        }
    }

    function loadFromPreset(pid) {
        const pData = presets[pid];
        if(!pData.subjects || pData.subjects.length === 0) { alert("저장된 과목이 없는 프리셋입니다."); return; }
        if(confirm(`'${pData.name}'을 불러올까요? 현재 리스트는 삭제됩니다.`)) {
            db.ref("subjectList").remove();
            db.ref("assignments").remove();
            pData.subjects.forEach((name, idx) => {
                const subId = 'sub' + (Date.now() + idx);
                db.ref("subjectList/" + subId).set(name);
            });
        }
    }

    function addSubjectDirect() {
        const name = document.getElementById('direct-sub-input').value;
        if(!name) return;
        db.ref("subjectList/sub" + Date.now()).set(name);
        document.getElementById('direct-sub-input').value = '';
    }

    function renderSubjects() {
        const container = document.getElementById('subject-container');
        container.innerHTML = '';
        Object.entries(subjectList).forEach(([subId, subName]) => {
            const card = document.createElement('div');
            card.className = 'subject-card';
            card.innerHTML = `
                <div class="subject-header">
                    <input type="text" class="subject-title" value="${subName}" onchange="db.ref('subjectList/${subId}').set(this.value)">
                    <button style="border:none; background:none; color:#ccc; cursor:pointer;" onclick="if(confirm('삭제?')) db.ref('subjectList/${subId}').remove()">✕</button>
                </div>
                <div id="list-sub-${subId}"></div>
            `;
            container.appendChild(card);
            
            const taskIds = Object.keys(cloudData).filter(id => id.startsWith(subId)).sort();
            taskIds.forEach(id => {
                const t = cloudData[id];
                const row = document.createElement('div');
                row.className = 'task-row';
                row.innerHTML = `
                    <div class="input-group">
                        <input type="checkbox" ${t.checked ? 'checked' : ''} onchange="db.ref('assignments/${id}/checked').set(this.checked)">
                        <input type="text" class="task-input" value="${t.text}" onchange="db.ref('assignments/${id}/text').set(this.value)">
                        <button style="border:none; background:none; color:red; cursor:pointer;" onclick="db.ref('assignments/${id}').remove()">✕</button>
                    </div>
                    <input type="date" value="${t.date}" style="width:100%; border:none; font-size:0.8em; color:#888;" onchange="db.ref('assignments/${id}/date').set(this.value)">
                `;
                document.getElementById(`list-sub-${subId}`).appendChild(row);
            });

            const addBtn = document.createElement('button');
            addBtn.className = 'add-task-btn';
            addBtn.innerText = '+ 과제 추가';
            addBtn.onclick = () => { db.ref("assignments/"+subId+'t'+Date.now()).set({text:"", date:"", checked:false}); };
            card.appendChild(addBtn);
        });
    }

    function resetAll() { if(confirm("모든 데이터를 초기화하시겠습니까? (프리셋 제외)")) { db.ref("assignments").remove(); db.ref("subjectList").remove(); } }

    function updateWidgets() {
        let total = 0, completed = 0, today = 0, remain = 0;
        const todayStr = new Date().toISOString().split('T')[0];
        Object.values(cloudData).forEach(t => { if(t.text) { total++; if(t.checked) completed++; else { remain++; if(t.date === todayStr) today++; } } });
        const percent = total === 0 ? 0 : Math.round((completed/total)*100);
        document.getElementById('progress-text').innerText = percent + '%';
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('today-count').innerText = today;
        document.getElementById('remaining-count').innerText = remain;
    }
    
    function showTab(t) { } // 리스트 탭 고정
</script>
</body>
</html>
