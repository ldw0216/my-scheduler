<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>대학교 과제 및 일정 정리</title>
    <style>
        :root { --main-color: #3498db; --bg-color: #f8f9fa; --border-color: #e1e8ed; --task-color: #3498db; --long-color: #f39c12; --success-color: #27ae60; --danger-color: #e74c3c; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); margin: 0; padding: 20px; color: #2c3e50; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); }
        
        /* 대시보드 위젯 */
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .widget-card { background: #fff; border: 1px solid var(--border-color); padding: 15px; border-radius: 12px; text-align: center; }
        .widget-value { font-size: 1.4em; font-weight: bold; color: var(--main-color); }
        .progress-container { background: #eee; border-radius: 10px; height: 8px; margin-top: 10px; overflow: hidden; }
        .progress-bar { background: var(--success-color); height: 100%; width: 0%; transition: width 0.5s; }

        /* 탭 및 레이아웃 */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid var(--border-color); }
        .tab-btn { padding: 12px 25px; border: none; background: none; cursor: pointer; font-weight: bold; color: #7f8c8d; font-size: 1.1em; }
        .tab-btn.active { color: var(--main-color); border-bottom: 3px solid var(--main-color); }
        .content-section { display: none; }
        .content-section.active { display: block; }

        /* 과제 카드 스타일 */
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .subject-card { border: 1px solid var(--border-color); padding: 20px; border-radius: 12px; display: flex; flex-direction: column; background: #fff; }
        .subject-title { font-weight: bold; color: #1a508b; margin-bottom: 15px; display: block; }
        .task-row { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #eee; }
        .input-group { display: flex; align-items: center; gap: 8px; }
        .task-input { flex: 1; border: none; border-bottom: 1px solid #ddd; outline: none; font-size: 0.9em; }
        .btn-del { background: none; border: none; color: var(--danger-color); cursor: pointer; font-weight: bold; }
        .add-task-btn { width: 100%; padding: 8px; margin-top: 10px; border: 1px dashed var(--main-color); background: #f0f7ff; color: var(--main-color); border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* 달력 및 기간 일정 */
        .long-event-form { background: #fff8ee; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #fce4bd; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #eee; border-left: 1px solid #eee; }
        .calendar-day { min-height: 110px; padding: 8px; border-right: 1px solid #eee; border-bottom: 1px solid #eee; background: #fff; overflow-y: auto; }
        .event-bar { font-size: 0.7em; padding: 3px 6px; margin-bottom: 2px; border-radius: 4px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .event-task { background: var(--task-color); }
        .event-long { background: var(--long-color); }
        .completed { opacity: 0.4; text-decoration: line-through; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center; margin-bottom: 20px;">
        <h1 style="color: #1a508b;">대학교 과제 및 일정 정리</h1>
    </header>

    <div class="dashboard">
        <div class="widget-card">
            <h4>전체 이행률</h4>
            <div class="widget-value" id="progress-text">0%</div>
            <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
        </div>
        <div class="widget-card"><h4>오늘 마감</h4><div class="widget-value" id="today-count" style="color: #e74c3c;">0</div></div>
        <div class="widget-card"><h4>남은 과제</h4><div class="widget-value" id="remaining-count">0</div></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('list')">📋 체크리스트</button>
        <button class="tab-btn" onclick="showTab('calendar')">📅 통합 달력</button>
    </div>

    <div id="list-section" class="content-section active">
        <div class="grid-layout" id="subject-container"></div>
    </div>

    <div id="calendar-section" class="content-section">
        <div class="long-event-form">
            <strong>🚩 기간 일정 등록:</strong>
            <div style="display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;">
                <input type="text" id="long-text" placeholder="일정 내용" style="flex:1; padding: 6px; border: 1px solid #ddd; border-radius: 4px;">
                <input type="date" id="long-start" style="padding: 6px; border: 1px solid #ddd; border-radius: 4px;"> ~ 
                <input type="date" id="long-end" style="padding: 6px; border: 1px solid #ddd; border-radius: 4px;">
                <button onclick="addLongEvent()" style="background:var(--long-color); color:white; border:none; padding:6px 15px; border-radius:4px; cursor:pointer;">추가</button>
                <button onclick="clearLongEvents()" style="background:#95a5a6; color:white; border:none; padding:6px 15px; border-radius:4px; cursor:pointer;">초기화</button>
            </div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <button onclick="changeMonth(-1)">◀ 이전 달</button>
            <h2 id="month-display" style="margin:0;"></h2>
            <button onclick="changeMonth(1)">다음 달 ▶</button>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
    </div>
</div>

<script>
    const subjects = ["파이썬 프로그래밍", "컴퓨터수학", "공학설계입문", "컴퓨테이셔널띵킹", "기초수학", "컴퓨팅사고와데이터의이해", "SW융합개론"];
    let currentDate = new Date();

    function init() {
        renderSubjects();
        updateWidgets();
    }

    function renderSubjects() {
        const container = document.getElementById('subject-container');
        container.innerHTML = '';
        subjects.forEach((sub, sIdx) => {
            const card = document.createElement('div');
            card.className = 'subject-card';
            let taskIds = JSON.parse(localStorage.getItem(`sub-${sIdx}-layout`)) || [`s${sIdx}t1`, `s${sIdx}t2`, `s${sIdx}t3`];
            
            card.innerHTML = `<span class="subject-title">${sub}</span><div id="list-sub-${sIdx}"></div>`;
            container.appendChild(card);
            
            taskIds.forEach(id => renderTaskRow(sIdx, id));
            
            const addBtn = document.createElement('button');
            addBtn.className = 'add-task-btn';
            addBtn.innerText = '+ 과제 추가';
            addBtn.onclick = () => addTask(sIdx);
            card.appendChild(addBtn);
        });
    }

    function renderTaskRow(sIdx, taskId) {
        const listContainer = document.getElementById(`list-sub-${sIdx}`);
        const saved = JSON.parse(localStorage.getItem(taskId)) || { text: "", date: "", checked: false };
        const row = document.createElement('div');
        row.className = 'task-row';
        row.id = `row-${taskId}`;
        row.innerHTML = `
            <div class="input-group">
                <input type="checkbox" id="check-${taskId}" ${saved.checked ? 'checked' : ''} onchange="saveTask('${taskId}')">
                <input type="text" class="task-input ${saved.checked ? 'completed' : ''}" id="text-${taskId}" value="${saved.text}" placeholder="과제 내용" oninput="saveTask('${taskId}')">
                <button class="btn-del" onclick="removeTask(${sIdx}, '${taskId}')">✕</button>
            </div>
            <input type="date" id="date-${taskId}" value="${saved.date}" style="font-size:0.75em; border:1px solid #eee; width:100%; margin-top:5px;" onchange="saveTask('${taskId}')">
        `;
        listContainer.appendChild(row);
    }

    function addTask(sIdx) {
        const newId = `s${sIdx}t${Date.now()}`;
        let taskIds = JSON.parse(localStorage.getItem(`sub-${sIdx}-layout`)) || [`s${sIdx}t1`, `s${sIdx}t2`, `s${sIdx}t3`];
        taskIds.push(newId);
        localStorage.setItem(`sub-${sIdx}-layout`, JSON.stringify(taskIds));
        renderTaskRow(sIdx, newId);
        updateWidgets();
    }

    function removeTask(sIdx, taskId) {
        if(!confirm("삭제하시겠습니까?")) return;
        let taskIds = JSON.parse(localStorage.getItem(`sub-${sIdx}-layout`));
        taskIds = taskIds.filter(id => id !== taskId);
        localStorage.setItem(`sub-${sIdx}-layout`, JSON.stringify(taskIds));
        localStorage.removeItem(taskId);
        document.getElementById(`row-${taskId}`).remove();
        updateWidgets();
    }

    function saveTask(id) {
        const data = {
            text: document.getElementById('text-' + id).value,
            date: document.getElementById('date-' + id).value,
            checked: document.getElementById('check-' + id).checked
        };
        localStorage.setItem(id, JSON.stringify(data));
        document.getElementById('text-' + id).classList.toggle('completed', data.checked);
        updateWidgets();
    }

    function addLongEvent() {
        const text = document.getElementById('long-text').value;
        const start = document.getElementById('long-start').value;
        const end = document.getElementById('long-end').value;
        if(!text || !start || !end) return alert("내용과 기간을 입력하세요.");
        const events = JSON.parse(localStorage.getItem('longEvents')) || [];
        events.push({ text, start, end });
        localStorage.setItem('longEvents', JSON.stringify(events));
        document.getElementById('long-text').value = '';
        renderCalendar();
    }

    function clearLongEvents() {
        if(confirm("모든 기간 일정을 삭제하시겠습니까?")) {
            localStorage.removeItem('longEvents');
            renderCalendar();
        }
    }

    function updateWidgets() {
        let total = 0, completed = 0, todayTasks = 0, remaining = 0;
        const todayStr = new Date().toISOString().split('T')[0];
        subjects.forEach((_, sIdx) => {
            const taskIds = JSON.parse(localStorage.getItem(`sub-${sIdx}-layout`)) || [`s${sIdx}t1`, `s${sIdx}t2`, `s${sIdx}t3`];
            taskIds.forEach(id => {
                const task = JSON.parse(localStorage.getItem(id));
                if (task && task.text) {
                    total++;
                    if (task.checked) completed++;
                    else {
                        remaining++;
                        if (task.date === todayStr) todayTasks++;
                    }
                }
            });
        });
        const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('progress-text').innerText = percent + '%';
        document.getElementById('today-count').innerText = todayTasks;
        document.getElementById('remaining-count').innerText = remaining;
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        const display = document.getElementById('month-display');
        grid.innerHTML = '';
        const y = currentDate.getFullYear(), m = currentDate.getMonth();
        display.innerText = `${y}년 ${m + 1}월`;
        const firstDay = new Date(y, m, 1).getDay(), lastDate = new Date(y, m + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div')).className = 'calendar-day';
        for (let d = 1; d <= lastDate; d++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'calendar-day';
            const curDateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const curDateObj = new Date(curDateStr);
            dayDiv.innerHTML = `<div style="font-size:0.8em; font-weight:bold; margin-bottom:5px;">${d}</div>`;

            // 1. 일반 과제 연동
            subjects.forEach((_, sIdx) => {
                const taskIds = JSON.parse(localStorage.getItem(`sub-${sIdx}-layout`)) || [`s${sIdx}t1`, `s${sIdx}t2`, `s${sIdx}t3`];
                taskIds.forEach(id => {
                    const task = JSON.parse(localStorage.getItem(id));
                    if (task && task.date === curDateStr && task.text) {
                        const el = document.createElement('div');
                        el.className = `event-bar event-task ${task.checked ? 'completed' : ''}`;
                        el.innerText = `📝 ${task.text}`;
                        dayDiv.appendChild(el);
                    }
                });
            });

            // 2. 기간 일정 연동
            const longEvents = JSON.parse(localStorage.getItem('longEvents')) || [];
            longEvents.forEach(ev => {
                const s = new Date(ev.start), e = new Date(ev.end);
                if (curDateObj >= s && curDateObj <= e) {
                    const el = document.createElement('div');
                    el.className = 'event-bar event-long';
                    el.innerText = `🚩 ${ev.text}`;
                    dayDiv.appendChild(el);
                }
            });
            grid.appendChild(dayDiv);
        }
    }

    function showTab(type) {
        document.querySelectorAll('.content-section, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(type + '-section').classList.add('active');
        event.currentTarget.classList.add('active');
        if (type === 'calendar') renderCalendar();
    }

    function changeMonth(v) { currentDate.setMonth(currentDate.getMonth() + v); renderCalendar(); }
    init();
</script>
</body>
</html>
