<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대학 생활 올인원 플래너</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --main-color: #3498db; --bg-color: #f8f9fa; --border-color: #e1e8ed; --task-color: #3498db; --long-color: #f39c12; --success-color: #2ecc71; --danger-color: #e74c3c; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); margin: 0; padding: 10px; color: #2c3e50; padding-bottom: 100px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); }
        
        /* 프리셋 관리 */
        .preset-section { background: #fdfefe; border: 2px dashed #d6dbdf; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .preset-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; margin-top: 10px; }
        .preset-card { background: #f8f9fa; border: 1px solid #ddd; padding: 10px; border-radius: 10px; text-align: center; }
        .preset-name-input { width: 90%; border: 1px solid #ccc; border-radius: 4px; padding: 6px; margin-bottom: 5px; font-size: 0.8em; text-align: center; }
        .btn-p-save { background: var(--success-color); color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.75em; font-weight: bold; }
        .btn-p-load { background: #6c5ce7; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.75em; font-weight: bold; }

        /* 대시보드 */
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .widget-card { background: #fff; border: 1px solid var(--border-color); padding: 10px; border-radius: 12px; text-align: center; }
        .widget-value { font-size: 1.1em; font-weight: bold; color: var(--main-color); }

        /* 탭 메뉴 */
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; cursor: pointer; font-weight: bold; color: #7f8c8d; }
        .tab-btn.active { color: var(--main-color); border-bottom: 3px solid var(--main-color); }
        .content-section { display: none; }
        .content-section.active { display: block; }

        /* 리스트 뷰 */
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .subject-card { border: 1px solid var(--border-color); padding: 15px; border-radius: 15px; background: #fff; }
        .subject-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .btn-task-del { min-width: 40px; min-height: 40px; border-radius: 8px; border: none; background: #fff5f5; color: var(--danger-color); font-size: 1.2em; cursor: pointer; }
        .task-row { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #eee; }

        /* 달력 뷰 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #eee; border-left: 1px solid #eee; }
        .calendar-day { min-height: 80px; padding: 4px; border-right: 1px solid #eee; border-bottom: 1px solid #eee; background: #fff; font-size: 0.8em; }
        .event-bar { font-size: 0.7em; padding: 2px 4px; margin-bottom: 2px; border-radius: 3px; color: white; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .event-long { background: var(--long-color); }
        .event-task { background: var(--task-color); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }

        .reset-btn { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 30px; border: none; background: #5d6d7e; color: white; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="preset-section">
        <strong>📚 과목 프리셋 (최대 4개)</strong>
        <div style="display: flex; gap: 8px; margin-top: 10px;">
            <input type="text" id="direct-input" placeholder="새 과목명" style="flex:1; padding:10px; border:1px solid #ddd; border-radius:8px;">
            <button onclick="addSubject()" style="background:var(--main-color); color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer;">추가</button>
        </div>
        <div class="preset-grid" id="preset-container"></div>
    </div>

    <div class="dashboard">
        <div class="widget-card">이행률<div class="widget-value" id="prog-val">0%</div></div>
        <div class="widget-card">오늘 마감<div class="widget-value" id="today-val" style="color:red">0</div></div>
        <div class="widget-card">남은 과제<div class="widget-value" id="rem-val">0</div></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-list" onclick="showTab('list')">📋 과제 리스트</button>
        <button class="tab-btn" id="btn-cal" onclick="showTab('calendar')">📅 달력 보기</button>
    </div>

    <div id="list-section" class="content-section active">
        <div class="grid-layout" id="subject-container"></div>
    </div>

    <div id="calendar-section" class="content-section">
        <div style="background:#fff8ee; padding:12px; border-radius:10px; margin-bottom:15px; font-size:0.85em; border:1px solid #fce4bd;">
            <strong>🚩 기간 일정(시험 등) 등록:</strong>
            <div style="display:flex; gap:5px; margin-top:5px;">
                <input type="text" id="long-title" placeholder="일정명" style="flex:1; padding:5px;">
                <input type="date" id="long-s"> ~ <input type="date" id="long-e">
                <button onclick="addLong()" style="background:var(--long-color); color:white; border:none; padding:5px; border-radius:4px;">등록</button>
            </div>
        </div>
        <div class="cal-header">
            <button onclick="changeMonth(-1)">◀</button>
            <h3 id="month-label"></h3>
            <button onclick="changeMonth(1)">▶</button>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
    </div>
</div>

<button class="reset-btn" onclick="if(confirm('모든 데이터를 초기화할까요?')) { db.ref('assignments').remove(); db.ref('subjectList').remove(); }">🧹 초기화</button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBFgo6A1AzR1XOF_xBPDcsAqbD-Otg8-vk",
        authDomain: "collage-scheduler.firebaseapp.com",
        databaseURL: "https://collage-scheduler-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "collage-scheduler",
        storageBucket: "collage-scheduler.appspot.com",
        messagingSenderId: "453104339634",
        appId: "1:453104339634:web:61fa883b7aad617d6917ab"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cloudData = {}, subjectList = {}, presets = {}, longEvents = {};
    let viewDate = new Date();

    db.ref().on("value", (snap) => {
        const d = snap.val() || {};
        cloudData = d.assignments || {};
        subjectList = d.subjectList || {};
        longEvents = d.longEvents || {};
        presets = d.presets || { p1:{name:"프리셋 1"}, p2:{name:"프리셋 2"}, p3:{name:"프리셋 3"}, p4:{name:"프리셋 4"} };
        
        renderPresets();
        renderSubjects();
        updateDashboard();
        if(document.getElementById('calendar-section').classList.contains('active')) renderCalendar();
    });

    function renderPresets() {
        const cont = document.getElementById('preset-container');
        cont.innerHTML = '';
        for(let i=1; i<=4; i++) {
            const pid = 'p'+i;
            const p = presets[pid];
            const div = document.createElement('div');
            div.className = 'preset-card';
            div.innerHTML = `
                <input type="text" class="preset-name-input" value="${p.name}" onchange="db.ref('presets/${pid}/name').set(this.value)">
                <div style="display:flex; justify-content:center; gap:3px;">
                    <button class="btn-p-save" onclick="saveP('${pid}')">저장</button>
                    <button class="btn-p-load" onclick="loadP('${pid}')">불러오기</button>
                </div>`;
            cont.appendChild(div);
        }
    }

    function saveP(pid) {
        const subs = Object.values(subjectList);
        if(subs.length && confirm(`현재 목록을 '${presets[pid].name}'에 저장할까요?`)) db.ref(`presets/${pid}/subjects`).set(subs);
    }

    function loadP(pid) {
        const s = presets[pid].subjects;
        if(s && confirm('불러오시겠습니까? 현재 데이터는 교체됩니다.')) {
            db.ref("subjectList").remove(); db.ref("assignments").remove();
            s.forEach((n, i) => db.ref("subjectList/sub"+(Date.now()+i)).set(n));
        }
    }

    function addSubject() {
        const n = document.getElementById('direct-input').value;
        if(n) { db.ref("subjectList/sub"+Date.now()).set(n); document.getElementById('direct-input').value=''; }
    }

    function renderSubjects() {
        const cont = document.getElementById('subject-container');
        cont.innerHTML = '';
        Object.entries(subjectList).forEach(([sid, sn]) => {
            const card = document.createElement('div');
            card.className = 'subject-card';
            card.innerHTML = `
                <div class="subject-header">
                    <input type="text" style="border:none; font-weight:bold; font-size:1.1em; width:70%" value="${sn}" onchange="db.ref('subjectList/${sid}').set(this.value)">
                    <button style="border:none; background:none; color:#ccc;" onclick="if(confirm('삭제?')) db.ref('subjectList/${sid}').remove()">✕</button>
                </div>
                <div id="tasks-${sid}"></div>
                <button class="add-task-btn" style="width:100%; padding:10px; margin-top:10px; border:1px dashed var(--main-color); background:#f0f7ff; color:var(--main-color); border-radius:8px; font-weight:bold;" onclick="db.ref('assignments/${sid}t'+Date.now()).set({text:'', date:'', checked:false})">+ 과제 추가</button>
            `;
            cont.appendChild(card);
            
            Object.keys(cloudData).filter(tid => tid.startsWith(sid)).forEach(tid => {
                const t = cloudData[tid];
                const row = document.createElement('div');
                row.className = 'task-row';
                row.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px;">
                        <input type="checkbox" ${t.checked?'checked':''} onchange="db.ref('assignments/${tid}/checked').set(this.checked)">
                        <input type="text" style="flex:1; border:none; border-bottom:1px solid #eee; padding:8px 0;" value="${t.text}" onchange="db.ref('assignments/${tid}/text').set(this.value)">
                        <button class="btn-task-del" onclick="db.ref('assignments/${tid}').remove()">✕</button>
                    </div>
                    <input type="date" style="width:100%; border:none; color:#888; font-size:0.8em; margin-top:5px;" value="${t.date}" onchange="db.ref('assignments/${tid}/date').set(this.value)">
                `;
                document.getElementById(`tasks-${sid}`).appendChild(row);
            });
        });
    }

    function addLong() {
        const t = document.getElementById('long-title').value;
        const s = document.getElementById('long-s').value;
        const e = document.getElementById('long-e').value;
        if(t && s && e) { db.ref("longEvents/ev"+Date.now()).set({text:t, start:s, end:e}); document.getElementById('long-title').value=''; }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        document.getElementById('month-label').innerText = `${y}년 ${m+1}월`;
        const first = new Date(y, m, 1).getDay(), last = new Date(y, m+1, 0).getDate();
        for(let i=0; i<first; i++) grid.appendChild(document.createElement('div')).className='calendar-day';
        for(let d=1; d<=last; d++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'calendar-day';
            const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            dayDiv.innerHTML = `<strong>${d}</strong>`;
            
            Object.entries(longEvents).forEach(([id, ev]) => {
                if(dateStr >= ev.start && dateStr <= ev.end) {
                    const bar = document.createElement('div');
                    bar.className = 'event-bar event-long';
                    bar.innerText = '🚩 '+ev.text;
                    bar.onclick = () => { if(confirm('삭제?')) db.ref('longEvents/'+id).remove(); };
                    dayDiv.appendChild(bar);
                }
            });
            Object.values(cloudData).forEach(t => {
                if(t.date === dateStr && t.text) {
                    const bar = document.createElement('div');
                    bar.className = 'event-bar event-task';
                    bar.style.opacity = t.checked ? '0.4' : '1';
                    bar.innerText = '📝 '+t.text;
                    dayDiv.appendChild(bar);
                }
            });
            grid.appendChild(dayDiv);
        }
    }

    function showTab(t) {
        document.querySelectorAll('.content-section, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(t+'-section').classList.add('active');
        document.getElementById('btn-'+t).classList.add('active');
        if(t==='calendar') renderCalendar();
    }

    function changeMonth(v) { viewDate.setMonth(viewDate.getMonth()+v); renderCalendar(); }

    function updateDashboard() {
        let total=0, comp=0, today=0, rem=0;
        const now = new Date().toISOString().split('T')[0];
        Object.values(cloudData).forEach(t => {
            if(t.text) { total++; if(t.checked) comp++; else { rem++; if(t.date===now) today++; } }
        });
        document.getElementById('prog-val').innerText = total?Math.round(comp/total*100)+'%':'0%';
        document.getElementById('today-val').innerText = today;
        document.getElementById('rem-val').innerText = rem;
    }
</script>
</body>
</html>
